apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: default
data:
  DB_USER: postgres
  DB_NAME: taskdb
  DB_HOST: postgres-service
  DB_PORT: "5432"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-user-config
  namespace: default
data:
  ADMIN_USER: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: default
type: Opaque
stringData:
  DB_PASSWORD: password
  JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
