name: Build and Push Docker Hub Images

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_REPO: dragos93

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}/app1-backend:latest
            ${{ env.DOCKERHUB_REPO }}/app1-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}/app1-frontend:latest
            ${{ env.DOCKERHUB_REPO }}/app1-frontend:${{ github.sha }}

      - name: Build and push postgres image
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}/app1-postgres:latest
            ${{ env.DOCKERHUB_REPO }}/app1-postgres:${{ github.sha }}
